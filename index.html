<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>ブレインダンプ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      /* 共通パレット（指定カラー優先／文言の視認のためのみ濃い色を補佐） */
      --c-a: #ffccff;
      --c-b: #ccccff;
      --c-c: #99ccff;
      --c-d: #66ccff;
      --c-e: #33ccff;
      --c-f: #00ccff;
      --c-read: #0c3f52; /* 本文用（読みやすさ補佐。未使用でも可だったがコントラストのためのみ） */

      --bg: var(--c-b); /* ページ下地（フラット） */
      --surface: #ffffff;
      --border: var(--c-d);
      --text: var(--c-read);
      --muted: var(--c-e);
      --accent: var(--c-f);
      --accent-on: #ffffff;
      --accent-soft: rgb(153 204 255 / 0.45); /* --c-c ベース */

      --radius: 12px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 42rem;
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    header.hero {
      margin-bottom: 1.35rem;
    }

    .hero-title-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.65rem;
    }

    header.hero .app-title {
      margin: 0;
      font-family: inherit;
      font-weight: inherit;
      line-height: 1.2;
      font-size: inherit;
      display: flex;
      width: 100%;
      justify-content: center;
    }

    .hero-title-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.5rem 1.35rem;
      border-radius: 999px;
      background: linear-gradient(
        158deg,
        rgb(255 255 255 / 0.99) 0%,
        rgb(255 255 255 / 0.93) 45%,
        rgb(240 247 255 / 0.96) 100%
      );
      border: 2px solid rgb(255 255 255 / 0.95);
      box-shadow:
        0 12px 32px rgb(51 159 207 / 0.22),
        0 1px rgb(255 255 255 / 1) inset,
        0 0 0 1px rgb(102 204 255 / 0.42);
    }

    .app-title-spark {
      font-size: 1.05rem;
      line-height: 1;
      user-select: none;
      opacity: 0.95;
      filter: saturate(118%);
      text-shadow: 0 0 12px rgb(255 204 255 / 0.7);
    }

    .app-title-word {
      font-family: "Zen Maru Gothic", ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic UI", sans-serif;
      font-size: clamp(1.6rem, 4.6vw + 0.35rem, 2.15rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      position: relative;
      display: inline-block;
      padding-bottom: 0.05rem;
      /* 見やすさ優先：濃い色＋読み心地のシャドウ（フォントは丸ゴのまま） */
      color: var(--c-read);
      -webkit-text-fill-color: currentColor;
      text-shadow:
        0 1px 0 rgb(255 255 255 / 0.92),
        0 10px 24px rgb(51 147 173 / 0.18);
      transform-origin: center;
      animation: hero-title-wave 10s ease-in-out infinite;
    }

    @keyframes hero-title-wave {
      0%,
      100% {
        transform: rotate(-0.6deg);
      }

      50% {
        transform: rotate(0.55deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-title-word {
        animation: none;
      }
    }

    header.hero .hero-tagline {
      margin: 0;
      max-width: 24em;
      color: #ffffff;
      font-size: 0.9375rem;
      line-height: 1.65;
      text-shadow:
        0 1px 2px rgb(8 53 71 / 0.35),
        0 0 14px rgb(8 53 71 / 0.2);
      text-wrap: balance;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem 1.1rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin: 0.75rem 0 0.35rem;
      color: var(--muted);
    }

    label:first-child {
      margin-top: 0;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      font: inherit;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid var(--c-e);
      outline-offset: 2px;
    }

    select {
      cursor: pointer;
      min-height: 44px;
    }

    textarea {
      resize: vertical;
      min-height: 8rem;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.95rem;
      align-items: center;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 0.55rem 1rem;
      min-height: 44px;
      min-width: 4.75rem;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-on);
      font-weight: 600;
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-outline {
      background: var(--accent-soft);
      color: var(--text);
      border: 1px solid var(--c-d);
    }

    .btn-danger {
      background: rgb(255 204 255 / 0.55); /* --c-a ベース */
      color: var(--text);
      border: 1px solid rgb(153 204 255 / 0.9); /* --c-c */
    }

    .editing-chip {
      display: none;
      font-size: 0.8125rem;
      color: var(--text);
      background: rgb(255 204 255 / 0.58); /* --c-a */
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--c-b);
    }

    body.is-editing .editing-chip {
      display: inline-block;
    }

    body.is-editing .btn-primary {
      box-shadow: 0 0 0 3px rgb(51 204 255 / 0.45); /* --c-e */
    }

    #message {
      min-height: 1.75rem;
      margin: 0 0 0.85rem;
      padding: 0.45rem 0.65rem;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    #message:not(:empty) {
      display: block;
    }

    #message[data-kind="success"] {
      border: 1px solid var(--c-d);
      background: rgb(153 204 255 / 0.45); /* --c-c */
      color: var(--text);
    }

    #message[data-kind="error"] {
      border: 1px solid var(--c-e);
      background: rgb(255 204 255 / 0.55); /* --c-a */
      color: var(--text);
    }

    #message[data-kind="info"] {
      border: 1px solid var(--c-b);
      background: rgb(204 204 255 / 0.62); /* --c-b を薄める */
      color: var(--text);
    }

    .list-heading {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      margin: 0 0 0.65rem;
    }

    .list-heading h2 {
      margin: 0;
      font-size: 1.0625rem;
    }

    .list-scroll {
      max-height: min(62vh, 28rem);
      overflow-y: auto;
      padding-right: 4px;
    }

    ul#memo-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .memo-card {
      padding: 0.85rem 0.95rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      word-break: break-word;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 1px 2px rgb(0 204 255 / 0.12); /* --c-f */
    }

    .memo-card.is-active {
      border-color: var(--c-e);
      box-shadow: 0 0 0 2px rgb(102 204 255 / 0.55); /* --c-d */
    }

    .memo-title {
      font-weight: 700;
      font-size: 1rem;
      margin: 0 0 0.35rem;
    }

    .memo-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }

    .memo-preview {
      margin: 0 0 0.85rem;
      font-size: 0.895rem;
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .memo-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    #list-status {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    #list-status:empty {
      display: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="hero">
      <div class="hero-title-stack">
        <h1 class="app-title">
          <span class="hero-title-pill">
            <span class="app-title-spark" aria-hidden="true">✨</span>
            <span class="app-title-word">ブレインダンプ</span>
          </span>
        </h1>
        <p class="hero-tagline">気づいたことやアイデアを、その場でメモできる場所です。</p>
      </div>
    </header>

    <section class="panel" aria-labelledby="compose-heading">
      <h2 id="compose-heading" class="sr-only">メモの入力</h2>

      <span class="editing-chip" aria-live="polite">編集中です（保存すると更新されます）</span>

      <label for="memo-title-input">タイトル</label>
      <input id="memo-title-input" type="text" name="title" autocomplete="off" maxlength="500"
        placeholder="例：アプリのアイデア" />

      <label for="memo-content-input">本文</label>
      <textarea id="memo-content-input" name="content" maxlength="8000" placeholder="本文を入力"></textarea>

      <label for="memo-category-select">カテゴリ（任意）</label>
      <select id="memo-category-select" name="category_id">
        <option value="">（未選択）</option>
      </select>

      <div class="row-actions">
        <button type="button" class="btn-primary" id="btn-save">保存</button>
        <button type="button" class="btn-ghost hidden" id="btn-cancel-edit" aria-label="編集をやめる">編集をやめる</button>
      </div>
    </section>

    <div id="message" role="status" aria-live="polite"></div>

    <section class="panel" aria-labelledby="list-heading-label">
      <div class="list-heading">
        <h2 id="list-heading-label">メモ一覧</h2>
      </div>
      <p id="list-status"></p>
      <div class="list-scroll">
        <ul id="memo-list"></ul>
      </div>
    </section>
  </div>

  <!-- Supabase JS: CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    /* === Supabase 接続情報（このファイルのみで動かす運用です） === */
    const SUPABASE_URL = "https://viykfsmrckviprbuawbj.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpeWtmc21yY2t2aXByYnVhd2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzA3NDcsImV4cCI6MjA5MzkwNjc0N30.XMkyetgMes7Guj7EBC4FhAunMjM2kWw4MSCVRgqQNiE";

    const { createClient } = supabase;
    var supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /** 編集中メモ ID（無ければ新規） */
    var editingId = null;
    var msgTimerId = null;

    var els = {};
    /** コンテンツ要約用文字数上限 */
    var PREVIEW_CHARS = 200;

    function $(id) {
      return document.getElementById(id);
    }

    async function init() {
      els.titleInput = $("memo-title-input");
      els.contentInput = $("memo-content-input");
      els.categorySelect = $("memo-category-select");
      els.saveBtn = $("btn-save");
      els.cancelBtn = $("btn-cancel-edit");
      els.message = $("message");
      els.memoList = $("memo-list");
      els.listStatus = $("list-status");
      els.body = document.body;

      els.saveBtn.addEventListener("click", onSaveClick);
      els.cancelBtn.addEventListener("click", cancelEdit);
      els.memoList.addEventListener("click", onListClick);

      showMessage("", "hide");
      setListStatus("読み込み中…");
      await loadMemoCategories();
      await loadMemos();

      els.titleInput.focus();
    }

    /** @param {'success'|'error'|'info'|'hide'} kind */
    function showMessage(text, kind) {
      if (msgTimerId) clearTimeout(msgTimerId);
      if (!els.message) return;
      if (!text || kind === "hide") {
        els.message.textContent = "";
        els.message.removeAttribute("data-kind");
        return;
      }
      els.message.setAttribute("data-kind", kind === "success" ? "success" : kind === "error" ? "error" : "info");
      els.message.textContent = text;
      msgTimerId = setTimeout(function () {
        if (kind === "success" || kind === "info") {
          showMessage("", "hide");
        }
      }, 8000);
    }

    /** 一覧エリア直上の短文ステータス（空なら要素を消す見た目） */
    function setListStatus(html) {
      els.listStatus.textContent = html || "";
    }

    function setEditingState(id) {
      editingId = id || null;
      if (id) els.body.classList.add("is-editing");
      else els.body.classList.remove("is-editing");

      els.cancelBtn.classList.toggle("hidden", !id);
      updateActiveHighlight();
    }

    function cancelEdit() {
      setEditingState(null);
      els.titleInput.value = "";
      els.contentInput.value = "";
      els.categorySelect.value = "";
      els.titleInput.focus();
      showMessage("", "hide");
      updateActiveHighlight();
    }

    /** @returns {string|null} メモへの category_id。未選択は null（DB で NULL とする） */
    function categoryIdFromForm() {
      var v = String(els.categorySelect.value || "").trim();
      return v.length ? v : null;
    }

    /** memo_categories を select の option で描画する（先頭は未選択）。 */
    function populateCategorySelectOptions(rows) {
      var sel = els.categorySelect;
      var preserved = editingId ? String(sel.value || "") : "";

      sel.innerHTML = "";

      var o0 = document.createElement("option");
      o0.value = "";
      o0.textContent = "（未選択）";
      sel.appendChild(o0);

      if (rows && rows.length) {
        rows.forEach(function (r) {
          if (!r || !r.id) return;
          var o = document.createElement("option");
          o.value = r.id;
          o.textContent = r.name != null ? String(r.name) : "";
          sel.appendChild(o);
        });
      }

      setCategorySelectValue(preserved);
      sel.disabled = false;
    }

    function setCategorySelectValue(categoryUuid) {
      var sel = els.categorySelect;
      var want = categoryUuid ? String(categoryUuid) : "";
      if (!want) {
        sel.value = "";
        return;
      }
      var has = Array.prototype.some.call(sel.options, function (o) {
        return o.value === want;
      });
      sel.value = has ? want : "";
    }

    /** @returns {Promise<void>} */
    async function loadMemoCategories() {
      if (!els.categorySelect) return;
      els.categorySelect.disabled = true;
      try {
        var res = await supabaseClient
          .from("memo_categories")
          .select("id,name,sort_order")
          .order("sort_order", { ascending: true })
          .order("name", { ascending: true });

        if (res.error) throw res.error;

        populateCategorySelectOptions(res.data || []);
      } catch (e) {
        console.error(e);
        populateCategorySelectOptions([]);
        showMessage("カテゴリの選択肢を読み込めませんでした。「（未選択）」のみで続行できます。", "info");
      }
    }

    function readFormTrimmed() {
      return {
        title: els.titleInput.value.trim(),
        content: els.contentInput.value.trim()
      };
    }

    /** @returns {{ok:true,t:string,c:string}|{ok:false,msg:string}} */
    function validateForm(t, c) {
      if (!t || !c) {
        return { ok: false, msg: "タイトルと本文を入力してください" };
      }
      return { ok: true, t: t, c: c };
    }

    function truncatePreview(s) {
      if (!s) return "";
      if (s.length <= PREVIEW_CHARS) return s;
      return s.slice(0, PREVIEW_CHARS) + "…";
    }

    function formatDate(isoString) {
      try {
        var d = new Date(isoString);
        if (isNaN(d.getTime())) return isoString || "";
        return d.toLocaleString("ja-JP", {
          dateStyle: "medium",
          timeStyle: "short"
        });
      } catch (_) {
        return isoString || "";
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /** @param {{id:string,title:string,content:string,created_at:string,category_id?:string|null,memo_categories?:{name?:string}|null}[]} rows */
    function renderMemoList(rows) {
      els.memoList.innerHTML = "";

      if (!rows || rows.length === 0) {
        setListStatus("メモがありません。上のフォームから保存しましょう。");
        return;
      }

      setListStatus("");

      rows.forEach(function (row) {
        var id = escapeHtml(row.id);
        var catObj = row.memo_categories;
        var catName = "";
        if (catObj && typeof catObj === "object") {
          if (!Array.isArray(catObj)) {
            catName = catObj.name || "";
          } else if (catObj.length && catObj[0]) {
            catName = catObj[0].name || "";
          }
        }
        var li = document.createElement("li");
        li.innerHTML =
          '<article class="memo-card" data-id="' +
          id +
          '">' +
          '<p class="memo-title">' +
          escapeHtml(row.title || "") +
          "</p>" +
          '<p class="memo-meta">カテゴリ：' +
          escapeHtml(catName ? catName : "―") +
          "</p>" +
          '<p class="memo-meta">作成：' +
          escapeHtml(formatDate(row.created_at)) +
          "</p>" +
          '<p class="memo-preview">' +
          escapeHtml(truncatePreview(row.content || "")) +
          "</p>" +
          '<div class="memo-actions">' +
          '<button type="button" class="btn-outline" data-action="edit">編集</button>' +
          '<button type="button" class="btn-danger" data-action="delete">削除</button>' +
          "</div>" +
          "</article>";
        els.memoList.appendChild(li);
      });

      updateActiveHighlight();
    }

    async function loadMemos() {
      els.saveBtn.disabled = true;

      try {
        var res = await supabaseClient
          .from("brain_dumps")
          .select("id,title,content,created_at,category_id,memo_categories(name)")
          .order("created_at", { ascending: false });

        var err = res.error;
        var data = res.data;

        if (err) {
          console.error(err);
          renderMemoList([]);
          setListStatus("一覧を読み込めませんでした。ページを再読み込みするかしばらく待って試してください。");
          showMessage(mapSupabaseErr(err), "error");
          return;
        }

        renderMemoList(data || []);
      } catch (e) {
        console.error(e);
        renderMemoList([]);
        setListStatus("一覧を読み込めませんでした。ページを再読み込みするかしばらく待って試してください。");
        showMessage("接続に失敗しました。時間をおいて再度お試しください。", "error");
      } finally {
        els.saveBtn.disabled = false;
      }
    }

    function mapSupabaseErr(err) {
      if (!err) return "処理に失敗しました";
      var m = typeof err.message === "string" ? err.message.toLowerCase() : "";
      if (m.includes("fetch") || m.includes("network") || m.includes("failed to fetch"))
        return "接続に失敗しました。時間をおいて再度お試しください。";
      if (typeof err.message === "string") return err.message;
      return "処理に失敗しました";
    }

    /** @returns {Promise<void>} */
    async function onSaveClick() {
      var trimmed = readFormTrimmed();
      var v = validateForm(trimmed.title, trimmed.content);
      if (!v.ok) {
        showMessage(v.msg, "error");
        return;
      }

      els.saveBtn.disabled = true;

      try {
        if (editingId) {
          var payload = {
            title: v.t,
            content: v.c,
            category_id: categoryIdFromForm()
          };
          var up = await supabaseClient.from("brain_dumps").update(payload).eq("id", editingId).select("id");

          if (up.error) {
            console.error(up.error);
            showMessage(mapSupabaseErr(up.error), "error");
          } else {
            setEditingState(null);
            els.titleInput.value = "";
            els.contentInput.value = "";
            els.categorySelect.value = "";
            await loadMemos();
            showMessage("更新しました", "success");
          }
        } else {
          var payloadNew = {
            title: v.t,
            content: v.c,
            category_id: categoryIdFromForm()
          };
          var ins = await supabaseClient.from("brain_dumps").insert(payloadNew).select("id");

          if (ins.error) {
            console.error(ins.error);
            showMessage(mapSupabaseErr(ins.error), "error");
          } else {
            els.titleInput.value = "";
            els.contentInput.value = "";
            els.categorySelect.value = "";
            await loadMemos();
            showMessage("保存しました", "success");
          }
        }
      } catch (e) {
        console.error(e);
        showMessage("接続に失敗しました。時間をおいて再度お試しください。", "error");
      } finally {
        els.saveBtn.disabled = false;
      }
    }

    /** @param {MouseEvent} ev */
    function onListClick(ev) {
      var btn = ev.target.closest("button[data-action]");
      if (!btn || !ev.currentTarget.contains(btn)) return;

      var card = btn.closest(".memo-card");
      if (!card) return;

      var id = card.dataset.id;

      var action = btn.getAttribute("data-action");
      if (action === "edit") void beginEdit(id);
      if (action === "delete") requestDelete(card, id);
    }

    /** @returns {Promise<void>} */
    async function beginEdit(id) {
      els.titleInput.value = "";
      els.contentInput.value = "";
      els.categorySelect.value = "";
      setEditingState(id);

      els.saveBtn.disabled = true;

      try {
        await populateFromServer(id);
        els.titleInput.focus();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (err) {
        console.error(err);
        setEditingState(null);
        els.titleInput.value = "";
        els.contentInput.value = "";
        els.categorySelect.value = "";
        showMessage(mapSupabaseErr(err), "error");
      } finally {
        els.saveBtn.disabled = false;
      }
    }

    async function populateFromServer(id) {
      var sel = await supabaseClient
        .from("brain_dumps")
        .select("id,title,content,category_id")
        .eq("id", id)
        .maybeSingle();

      if (sel.error) throw sel.error;
      if (!sel.data) throw new Error("メモが見つかりません");

      els.titleInput.value = sel.data.title || "";
      els.contentInput.value = sel.data.content || "";
      setCategorySelectValue(sel.data.category_id || "");

      updateActiveHighlight();
    }

    function updateActiveHighlight() {
      nodesList().forEach(function (node) {
        var match = !!editingId && node.dataset.id === editingId;
        node.classList.toggle("is-active", match);
      });
    }

    function nodesList() {
      return Array.prototype.slice.call(els.memoList.querySelectorAll(".memo-card"));
    }

    /** @returns {Promise<void>} */
    async function requestDelete(_card, id) {
      var confirmed = confirm("このメモを削除しますか？");
      if (!confirmed) return;

      els.saveBtn.disabled = true;
      try {
        var del = await supabaseClient.from("brain_dumps").delete().eq("id", id);

        if (del.error) {
          console.error(del.error);
          showMessage(mapSupabaseErr(del.error), "error");
          return;
        }

        if (editingId === id) cancelEdit();

        await loadMemos();
        showMessage("削除しました", "success");
      } catch (e) {
        console.error(e);
        showMessage("接続に失敗しました。時間をおいて再度お試しください。", "error");
      } finally {
        els.saveBtn.disabled = false;
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      void init();
    });
  </script>
</body>

</html>
