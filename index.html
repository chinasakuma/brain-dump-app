<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>ブレインダンプ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #fff9e1;
      --cream-deep: #fff3c4;
      --yellow: #ffd700;
      --yellow-soft: #ffe566;
      --orange: #ff8c00;
      --orange-deep: #ff7000;
      --orange-glow: rgb(255 140 0 / 0.35);
      --bg: var(--cream);
      --surface: #ffffff;
      --border: rgb(255 183 77 / 0.55);
      --text: #1a1a1a;
      --muted: #8a5a20;
      --accent: linear-gradient(165deg, var(--orange) 0%, var(--orange-deep) 100%);
      --accent-on: #ffffff;
      --accent-soft: rgb(255 215 0 / 0.28);
      --radius: 14px;
      --font: "Zen Maru Gothic", ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgb(255 215 0 / 0.22), transparent 55%),
        radial-gradient(ellipse 90% 60% at 100% 100%, rgb(255 140 0 / 0.12), transparent 50%);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 42rem;
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    header.hero {
      margin-bottom: 1.35rem;
    }

    .hero-title-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.65rem;
    }

    header.hero .app-title {
      margin: 0;
      font-family: inherit;
      font-weight: inherit;
      line-height: 1.2;
      font-size: inherit;
      display: flex;
      width: 100%;
      justify-content: center;
    }

    .hero-title-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.55rem 1.4rem;
      border-radius: 999px;
      background: var(--surface);
      border: 2px solid var(--yellow);
      box-shadow: 0 10px 28px var(--orange-glow), 0 2px 0 rgb(255 255 255 / 1) inset;
    }

    .app-title-word {
      font-size: clamp(1.6rem, 4.6vw + 0.35rem, 2.15rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      background: linear-gradient(transparent 58%, var(--yellow-soft) 58%, var(--yellow) 88%, transparent 88%);
    }

    header.hero .hero-tagline {
      margin: 0;
      max-width: 24em;
      font-size: 0.9375rem;
      line-height: 1.65;
      font-weight: 500;
      text-wrap: balance;
    }

    header.hero .hero-tagline strong {
      color: var(--orange-deep);
      font-weight: 700;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 4px solid var(--orange);
      border-radius: var(--radius);
      padding: 1rem 1rem 1.1rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgb(255 140 0 / 0.1), 0 1px 0 rgb(255 215 0 / 0.35) inset;
    }

    .panel-heading {
      margin: 0 0 0.75rem;
      font-size: 1.05rem;
      font-weight: 700;
      border-bottom: 2px dashed var(--yellow);
      padding-bottom: 0.35rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin: 0.75rem 0 0.35rem;
      color: var(--muted);
    }

    label:first-child {
      margin-top: 0;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      font: inherit;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid var(--yellow);
      outline-offset: 2px;
      border-color: var(--orange);
    }

    select {
      cursor: pointer;
      min-height: 44px;
    }

    textarea {
      resize: vertical;
      min-height: 8rem;
    }

    .auth-hint {
      margin: 0.35rem 0 0;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .auth-panel .btn-primary {
      width: 100%;
      margin-top: 0.95rem;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.95rem;
      align-items: center;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 0.55rem 1rem;
      min-height: 44px;
      min-width: 4.75rem;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-on);
      font-weight: 700;
      box-shadow: 0 4px 14px var(--orange-glow);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-outline {
      background: var(--accent-soft);
      color: var(--text);
      border: 1px solid var(--yellow);
      font-weight: 600;
    }

    .btn-danger {
      background: rgb(255 235 238 / 0.9);
      color: #a33b2a;
      border: 1px solid rgb(255 183 77 / 0.7);
      font-weight: 600;
    }

    .auth-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem 0.75rem;
      margin-bottom: 1rem;
      padding: 0.55rem 0.85rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.875rem;
      box-shadow: 0 4px 12px rgb(255 140 0 / 0.08);
    }

    .auth-bar .user-email {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
      word-break: break-all;
    }

    .auth-bar .user-email strong {
      color: var(--text);
      font-weight: 700;
    }

    .auth-bar .btn-logout {
      min-width: auto;
      padding: 0.4rem 0.85rem;
      min-height: 40px;
      font-size: 0.8125rem;
    }

    .editing-chip {
      display: none;
      font-size: 0.8125rem;
      color: var(--orange-deep);
      background: var(--cream-deep);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--yellow);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    body.is-editing .editing-chip {
      display: inline-block;
    }

    body.is-editing .btn-primary {
      box-shadow: 0 0 0 3px rgb(255 215 0 / 0.55);
    }

    #message {
      min-height: 1.75rem;
      margin: 0 0 0.85rem;
      padding: 0.45rem 0.65rem;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    #message:not(:empty) {
      display: block;
    }

    #message[data-kind="success"] {
      border: 1px solid var(--yellow);
      background: var(--cream-deep);
      color: var(--text);
    }

    #message[data-kind="error"] {
      border: 1px solid rgb(255 140 0 / 0.6);
      background: rgb(255 243 224 / 0.95);
      color: #7a3e10;
    }

    #message[data-kind="info"] {
      border: 1px solid var(--yellow);
      background: var(--surface);
      color: var(--muted);
    }

    .list-heading h2 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 700;
      padding-bottom: 0.15rem;
      border-bottom: 3px dashed var(--yellow);
      display: inline-block;
    }

    .list-scroll {
      max-height: min(62vh, 28rem);
      overflow-y: auto;
      padding-right: 4px;
    }

    ul#memo-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .memo-card {
      padding: 0.85rem 0.95rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      word-break: break-word;
      box-shadow: 0 4px 12px rgb(255 140 0 / 0.08);
    }

    .memo-card.is-active {
      border-color: var(--orange);
      box-shadow: 0 0 0 2px rgb(255 215 0 / 0.65);
    }

    .memo-title {
      font-weight: 700;
      font-size: 1rem;
      margin: 0 0 0.35rem;
    }

    .memo-meta {
      font-size: 0.75rem;
      color: var(--orange-deep);
      font-weight: 600;
      margin: 0 0 0.5rem;
    }

    .memo-preview {
      margin: 0 0 0.85rem;
      font-size: 0.895rem;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .memo-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    #list-status {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    #list-status:empty {
      display: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="hero">
      <div class="hero-title-stack">
        <h1 class="app-title">
          <span class="hero-title-pill">
            <span aria-hidden="true">✨</span>
            <span class="app-title-word">ブレインダンプ</span>
          </span>
        </h1>
        <p class="hero-tagline" id="hero-tagline">メールアドレスとパスワードで<strong>ログイン</strong>してください。</p>
      </div>
    </header>

    <!-- 認証 UI（未ログイン時のみ表示） -->
    <div id="auth-screen">
      <section class="panel auth-panel" aria-labelledby="login-heading">
        <h2 id="login-heading" class="panel-heading">ログイン</h2>
        <label for="login-email">メールアドレス</label>
        <input id="login-email" type="email" autocomplete="email" />
        <label for="login-password">パスワード</label>
        <input id="login-password" type="password" autocomplete="current-password" />
        <p class="auth-hint">パスワードは6文字以上</p>
        <button type="button" class="btn-primary" id="btn-login">ログイン</button>
      </section>

      <section class="panel auth-panel" aria-labelledby="register-heading">
        <h2 id="register-heading" class="panel-heading">新規登録</h2>
        <label for="register-email">メールアドレス</label>
        <input id="register-email" type="email" autocomplete="email" />
        <label for="register-password">パスワード</label>
        <input id="register-password" type="password" autocomplete="new-password" />
        <p class="auth-hint">パスワードは6文字以上</p>
        <button type="button" class="btn-primary" id="btn-register">新規登録</button>
      </section>
    </div>

    <!-- メモ UI（ログイン後のみ表示） -->
    <div id="app-main" class="hidden">
      <div class="auth-bar">
        <p class="user-email">ログイン中: <strong id="user-email-display">—</strong></p>
        <button type="button" class="btn-ghost btn-logout" id="btn-logout">ログアウト</button>
      </div>

      <section class="panel" aria-labelledby="compose-heading">
        <h2 id="compose-heading" class="sr-only">メモの入力</h2>
        <span class="editing-chip" aria-live="polite">編集中です（保存すると更新されます）</span>

        <label for="memo-title-input">タイトル</label>
        <input id="memo-title-input" type="text" autocomplete="off" />

        <label for="memo-content-input">本文</label>
        <textarea id="memo-content-input"></textarea>

        <label for="memo-category-select">カテゴリ（任意）</label>
        <select id="memo-category-select">
          <option value="">（未選択）</option>
        </select>

        <div class="row-actions">
          <button type="button" class="btn-primary" id="btn-save">保存</button>
          <button type="button" class="btn-ghost hidden" id="btn-cancel-edit">編集をやめる</button>
        </div>
      </section>

      <div id="message" role="status" aria-live="polite"></div>

      <section class="panel" aria-labelledby="list-heading-label">
        <div class="list-heading">
          <h2 id="list-heading-label">メモ一覧</h2>
        </div>
        <p id="list-status"></p>
        <div class="list-scroll">
          <ul id="memo-list"></ul>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    (function () {
      "use strict";

      var SUPABASE_URL = "https://viykfsmrckviprbuawbj.supabase.co";
      var SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpeWtmc21yY2t2aXByYnVhd2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzA3NDcsImV4cCI6MjA5MzkwNjc0N30.XMkyetgMes7Guj7EBC4FhAunMjM2kWw4MSCVRgqQNiE";

      var MIN_PASSWORD_LEN = 6;
      var PREVIEW_CHARS = 200;
      var TAGLINE_AUTH = "メールアドレスとパスワードで<strong>ログイン</strong>してください。";
      var TAGLINE_APP = "気づいたことやアイデアを、<strong>その場でメモ</strong>できる場所です。";

      var supabaseClient =
        typeof supabase !== "undefined" && supabase.createClient
          ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
          : null;

      var editingId = null;
      var msgTimerId = null;
      var memoAppReady = false;

      var els = {};

      function $(id) {
        return document.getElementById(id);
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /* --- 表示切替（画面仕様 3.2） --- */

      function setHeroTagline(html) {
        $("hero-tagline").innerHTML = html;
      }

      function showAuthView() {
        $("auth-screen").classList.remove("hidden");
        $("app-main").classList.add("hidden");
        setHeroTagline(TAGLINE_AUTH);
        memoAppReady = false;
        if (els.message) showMessage("", "hide");
        if (els.listStatus) els.listStatus.textContent = "";
        if (els.memoList) els.memoList.innerHTML = "";
        clearMemoForm();
        setEditingState(null);
      }

      function showAppView() {
        $("auth-screen").classList.add("hidden");
        $("app-main").classList.remove("hidden");
        setHeroTagline(TAGLINE_APP);
      }

      function setUserEmailDisplay(email) {
        $("user-email-display").textContent = email || "—";
      }

      /* --- 認証（機能仕様 4.7〜4.10） --- */

      function mapAuthErr(err) {
        if (!err) return "処理に失敗しました";
        var msg = err.message || "";
        var low = msg.toLowerCase();
        if (low.indexOf("invalid login credentials") !== -1 || low.indexOf("invalid credentials") !== -1) {
          return "メールアドレスまたはパスワードが正しくありません";
        }
        if (low.indexOf("already") !== -1 && low.indexOf("registered") !== -1) {
          return "このメールアドレスは既に登録されています";
        }
        if (low.indexOf("valid email") !== -1) {
          return "有効なメールアドレスを入力してください";
        }
        return msg || "処理に失敗しました";
      }

      function validateAuthInput(email, password) {
        var e = String(email || "").trim();
        var p = String(password || "");
        if (!e) {
          alert("メールアドレスを入力してください");
          return null;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) {
          alert("有効なメールアドレスを入力してください");
          return null;
        }
        if (!p || p.length < MIN_PASSWORD_LEN) {
          alert("パスワードは6文字以上で入力してください");
          return null;
        }
        return { email: e, password: p };
      }

      async function bootMemoApp() {
        if (memoAppReady) {
          await loadMemos();
          return;
        }
        memoAppReady = true;
        setListStatus("読み込み中…");
        await loadMemoCategories();
        await loadMemos();
        els.titleInput.focus();
      }

      async function onSessionReady(session) {
        if (!session || !session.user) {
          showAuthView();
          return;
        }
        setUserEmailDisplay(session.user.email || "");
        showAppView();
        await bootMemoApp();
      }

      async function onLogin() {
        var input = validateAuthInput($("login-email").value, $("login-password").value);
        if (!input) return;

        $("btn-login").disabled = true;
        try {
          var res = await supabaseClient.auth.signInWithPassword({
            email: input.email,
            password: input.password
          });
          if (res.error) {
            alert(mapAuthErr(res.error));
            return;
          }
          await onSessionReady(res.data.session);
        } catch (e) {
          console.error(e);
          alert("接続に失敗しました。時間をおいて再度お試しください。");
        } finally {
          $("btn-login").disabled = false;
        }
      }

      async function onRegister() {
        var input = validateAuthInput($("register-email").value, $("register-password").value);
        if (!input) return;

        $("btn-register").disabled = true;
        try {
          var res = await supabaseClient.auth.signUp({
            email: input.email,
            password: input.password
          });
          if (res.error) {
            alert(mapAuthErr(res.error));
            return;
          }
          if (res.data.session) {
            await onSessionReady(res.data.session);
            return;
          }
          alert(
            "登録は完了しましたが、ログイン状態を取得できませんでした。Supabase で「Confirm email」を無効にしているか確認し、ログインをお試しください。"
          );
        } catch (e) {
          console.error(e);
          alert("接続に失敗しました。時間をおいて再度お試しください。");
        } finally {
          $("btn-register").disabled = false;
        }
      }

      async function onLogout() {
        $("btn-logout").disabled = true;
        try {
          var res = await supabaseClient.auth.signOut();
          if (res.error) {
            alert(mapAuthErr(res.error));
            return;
          }
          showAuthView();
        } catch (e) {
          console.error(e);
          alert("ログアウトに失敗しました。時間をおいて再度お試しください。");
        } finally {
          $("btn-logout").disabled = false;
        }
      }

      /* --- メッセージ表示（機能仕様 4.6） --- */

      function showMessage(text, kind) {
        if (msgTimerId) clearTimeout(msgTimerId);
        if (!text || kind === "hide") {
          els.message.textContent = "";
          els.message.removeAttribute("data-kind");
          return;
        }
        els.message.setAttribute(
          "data-kind",
          kind === "success" ? "success" : kind === "error" ? "error" : "info"
        );
        els.message.textContent = text;
        if (kind === "success" || kind === "info") {
          msgTimerId = setTimeout(function () {
            showMessage("", "hide");
          }, 8000);
        }
      }

      function setListStatus(text) {
        els.listStatus.textContent = text || "";
      }

      function mapDbErr(err) {
        if (!err) return "処理に失敗しました";
        var msg = err.message || "";
        var low = msg.toLowerCase();
        if (low.indexOf("fetch") !== -1 || low.indexOf("network") !== -1) {
          return "接続に失敗しました。時間をおいて再度お試しください";
        }
        return msg || "処理に失敗しました";
      }

      /* --- 編集状態 --- */

      function setEditingState(id) {
        editingId = id || null;
        document.body.classList.toggle("is-editing", !!id);
        els.cancelBtn.classList.toggle("hidden", !id);
        updateActiveHighlight();
      }

      function clearMemoForm() {
        if (!els.titleInput) return;
        els.titleInput.value = "";
        els.contentInput.value = "";
        els.categorySelect.value = "";
      }

      function cancelEdit() {
        setEditingState(null);
        clearMemoForm();
        showMessage("", "hide");
      }

      function categoryIdFromForm() {
        var v = String(els.categorySelect.value || "").trim();
        return v ? v : null;
      }

      /* --- カテゴリ選択肢読込（機能仕様 4.1） --- */

      function populateCategorySelect(rows) {
        var preserved = editingId ? els.categorySelect.value : "";
        els.categorySelect.innerHTML = "";
        var opt0 = document.createElement("option");
        opt0.value = "";
        opt0.textContent = "（未選択）";
        els.categorySelect.appendChild(opt0);

        (rows || []).forEach(function (r) {
          if (!r || !r.id) return;
          var opt = document.createElement("option");
          opt.value = r.id;
          opt.textContent = r.name != null ? String(r.name) : "";
          els.categorySelect.appendChild(opt);
        });

        setCategorySelectValue(preserved);
        els.categorySelect.disabled = false;
      }

      function setCategorySelectValue(categoryUuid) {
        var want = categoryUuid ? String(categoryUuid) : "";
        if (!want) {
          els.categorySelect.value = "";
          return;
        }
        var found = false;
        for (var i = 0; i < els.categorySelect.options.length; i++) {
          if (els.categorySelect.options[i].value === want) found = true;
        }
        els.categorySelect.value = found ? want : "";
      }

      async function loadMemoCategories() {
        els.categorySelect.disabled = true;
        try {
          var res = await supabaseClient
            .from("memo_categories")
            .select("id,name,sort_order")
            .order("sort_order", { ascending: true })
            .order("name", { ascending: true });

          if (res.error) throw res.error;
          populateCategorySelect(res.data);
        } catch (e) {
          console.error(e);
          populateCategorySelect([]);
          showMessage("カテゴリの選択肢を読み込めませんでした。「（未選択）」のみで続行できます。", "info");
        }
      }

      /* --- メモ一覧（機能仕様 4.3） --- */

      function truncatePreview(s) {
        if (!s) return "";
        if (s.length <= PREVIEW_CHARS) return s;
        return s.slice(0, PREVIEW_CHARS) + "…";
      }

      function formatDate(iso) {
        try {
          var d = new Date(iso);
          if (isNaN(d.getTime())) return iso || "";
          return d.toLocaleString("ja-JP", { dateStyle: "medium", timeStyle: "short" });
        } catch (_) {
          return iso || "";
        }
      }

      function categoryNameFromRow(row) {
        var c = row.memo_categories;
        if (!c) return "";
        if (Array.isArray(c)) return c[0] && c[0].name ? c[0].name : "";
        return c.name || "";
      }

      function renderMemoList(rows) {
        els.memoList.innerHTML = "";
        if (!rows || !rows.length) {
          setListStatus("メモがありません。上のフォームから保存しましょう。");
          return;
        }
        setListStatus("");
        rows.forEach(function (row) {
          var id = escapeHtml(row.id);
          var catName = categoryNameFromRow(row);
          var li = document.createElement("li");
          li.innerHTML =
            '<article class="memo-card" data-id="' + id + '">' +
            '<p class="memo-title">' + escapeHtml(row.title || "") + "</p>" +
            '<p class="memo-meta">カテゴリ：' + escapeHtml(catName || "―") + "</p>" +
            '<p class="memo-meta">作成：' + escapeHtml(formatDate(row.created_at)) + "</p>" +
            '<p class="memo-preview">' + escapeHtml(truncatePreview(row.content || "")) + "</p>" +
            '<div class="memo-actions">' +
            '<button type="button" class="btn-outline" data-action="edit">編集</button>' +
            '<button type="button" class="btn-danger" data-action="delete">削除</button>' +
            "</div></article>";
          els.memoList.appendChild(li);
        });
        updateActiveHighlight();
      }

      async function loadMemos() {
        els.saveBtn.disabled = true;
        try {
          var userRes = await supabaseClient.auth.getUser();
          var user = userRes.data.user;
          var res = await supabaseClient
            .from("brain_dumps")
            .select("id,title,content,created_at,category_id,memo_categories(name)")
            .eq("user_id", user.id)
            .order("created_at", { ascending: false });

          if (res.error) {
            console.error(res.error);
            renderMemoList([]);
            setListStatus("一覧を読み込めませんでした。ページを再読み込みするかしばらく待って試してください。");
            showMessage(mapDbErr(res.error), "error");
            return;
          }
          renderMemoList(res.data || []);
        } catch (e) {
          console.error(e);
          renderMemoList([]);
          setListStatus("一覧を読み込めませんでした。ページを再読み込みするかしばらく待って試してください。");
          showMessage("接続に失敗しました。時間をおいて再度お試しください。", "error");
        } finally {
          els.saveBtn.disabled = false;
        }
      }

      /* --- 保存・更新（機能仕様 4.2 / 4.4） --- */

      function validateMemoForm(title, content) {
        if (!title || !content) {
          return { ok: false, msg: "タイトルと本文を入力してください" };
        }
        return { ok: true, title: title, content: content };
      }

      async function onSaveClick() {
        var trimmed = {
          title: els.titleInput.value.trim(),
          content: els.contentInput.value.trim()
        };
        var v = validateMemoForm(trimmed.title, trimmed.content);
        if (!v.ok) {
          showMessage(v.msg, "error");
          return;
        }

        els.saveBtn.disabled = true;
        var payload = {
          title: v.title,
          content: v.content,
          category_id: categoryIdFromForm()
        };

        try {
          if (editingId) {
            var up = await supabaseClient
              .from("brain_dumps")
              .update(payload)
              .eq("id", editingId);

            if (up.error) {
              showMessage(mapDbErr(up.error), "error");
              return;
            }
            setEditingState(null);
            clearMemoForm();
            await loadMemos();
            showMessage("更新しました", "success");
          } else {
            var userRes = await supabaseClient.auth.getUser();
            var user = userRes.data.user;
            payload.user_id = user.id;
            var ins = await supabaseClient.from("brain_dumps").insert(payload);
            if (ins.error) {
              showMessage(mapDbErr(ins.error), "error");
              return;
            }
            clearMemoForm();
            await loadMemos();
            showMessage("保存しました", "success");
          }
        } catch (e) {
          console.error(e);
          showMessage("接続に失敗しました。時間をおいて再度お試しください。", "error");
        } finally {
          els.saveBtn.disabled = false;
        }
      }

      /* --- 編集（機能仕様 4.4） --- */

      async function beginEdit(id) {
        clearMemoForm();
        setEditingState(id);
        els.saveBtn.disabled = true;
        try {
          var res = await supabaseClient
            .from("brain_dumps")
            .select("id,title,content,category_id")
            .eq("id", id)
            .maybeSingle();

          if (res.error) throw res.error;
          if (!res.data) throw new Error("メモが見つかりません");

          els.titleInput.value = res.data.title || "";
          els.contentInput.value = res.data.content || "";
          setCategorySelectValue(res.data.category_id || "");
          els.titleInput.focus();
          updateActiveHighlight();
        } catch (e) {
          console.error(e);
          setEditingState(null);
          clearMemoForm();
          showMessage(mapDbErr(e), "error");
        } finally {
          els.saveBtn.disabled = false;
        }
      }

      function updateActiveHighlight() {
        var cards = els.memoList.querySelectorAll(".memo-card");
        for (var i = 0; i < cards.length; i++) {
          var card = cards[i];
          card.classList.toggle("is-active", !!editingId && card.dataset.id === editingId);
        }
      }

      /* --- 削除（機能仕様 4.5） --- */

      async function requestDelete(id) {
        if (!confirm("このメモを削除しますか？")) return;

        els.saveBtn.disabled = true;
        try {
          var del = await supabaseClient.from("brain_dumps").delete().eq("id", id);
          if (del.error) {
            showMessage(mapDbErr(del.error), "error");
            return;
          }
          if (editingId === id) cancelEdit();
          await loadMemos();
          showMessage("削除しました", "success");
        } catch (e) {
          console.error(e);
          showMessage("接続に失敗しました。時間をおいて再度お試しください。", "error");
        } finally {
          els.saveBtn.disabled = false;
        }
      }

      function onListClick(ev) {
        var btn = ev.target.closest("button[data-action]");
        if (!btn) return;
        var card = btn.closest(".memo-card");
        if (!card) return;
        var id = card.dataset.id;
        var action = btn.getAttribute("data-action");
        if (action === "edit") void beginEdit(id);
        if (action === "delete") void requestDelete(id);
      }

      /* --- 初期化 --- */

      async function init() {
        els.titleInput = $("memo-title-input");
        els.contentInput = $("memo-content-input");
        els.categorySelect = $("memo-category-select");
        els.saveBtn = $("btn-save");
        els.cancelBtn = $("btn-cancel-edit");
        els.message = $("message");
        els.memoList = $("memo-list");
        els.listStatus = $("list-status");

        $("btn-login").addEventListener("click", function () {
          void onLogin();
        });
        $("btn-register").addEventListener("click", function () {
          void onRegister();
        });
        $("btn-logout").addEventListener("click", function () {
          void onLogout();
        });
        els.saveBtn.addEventListener("click", function () {
          void onSaveClick();
        });
        els.cancelBtn.addEventListener("click", cancelEdit);
        els.memoList.addEventListener("click", onListClick);

        if (!supabaseClient) {
          alert("Supabase のライブラリを読み込めませんでした。");
          return;
        }

        supabaseClient.auth.onAuthStateChange(function (event) {
          if (event === "SIGNED_OUT") showAuthView();
        });

        var sessionRes = await supabaseClient.auth.getSession();
        if (sessionRes.data && sessionRes.data.session) {
          await onSessionReady(sessionRes.data.session);
        } else {
          showAuthView();
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        void init();
      });
    })();
  </script>
</body>

</html>
